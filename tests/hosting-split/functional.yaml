---
########################################################################################################################
## Test Suite Configuration                                                                                           ##
########################################################################################################################
# Split-hosting deployment test. Backend API on one VM, frontend served by nginx on another. Validates that the
# backend health check works, nginx serves the frontend, and CORS headers are correctly configured to allow
# cross-origin requests from the frontend origin while rejecting unauthorized origins.
#
# The frontend VM includes a /usr/local/bin/deploy-frontend helper script that can be re-run manually to switch
# to any branch, tag, or commit:
#   deploy-frontend                  # rebuild from latest main
#   deploy-frontend feature/foo      # switch to a branch
#   deploy-frontend abc1234          # switch to a specific commit
suite: Aether Split Hosting Deployment Test Suite

########################################################################################################################
## Node Infrastructure Configuration                                                                                  ##
########################################################################################################################
lxd:
  networks:
    - name: split-host-test
      type: bridge
      subnet: 10.103.103.0/24
      gateway: 10.103.103.1

  profiles:
    - name: backend-profile
      description: Profile for the backend API VM
      devices:
        root:
          type: disk
          path: /
          pool: default
          opts:
            size: 50GB
      config:
        limits.cpu: "4"
        limits.memory: "4GB"

        user.user-data: |
          #cloud-config
          package_update: true
          packages:
            - curl
            - jq
          runcmd:
            - [ bash, -c, 'echo "complete" > /tmp/cloud-init.complete' ]

    - name: frontend-profile
      description: Profile for the frontend nginx VM
      devices:
        root:
          type: disk
          path: /
          pool: default
          opts:
            size: 50GB
      config:
        limits.cpu: "4"
        limits.memory: "4GB"

        user.user-data: |
          #cloud-config
          package_update: true
          packages:
            - curl
            - jq
            - nginx
            - git
            - ca-certificates
            - gnupg
          runcmd:
            # Install Node.js 20 via nodesource (Ubuntu's default nodejs may be too old for Vite)
            - [ bash, -c, 'curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs' ]
            - [ bash, -c, 'echo "complete" > /tmp/cloud-init.complete' ]

nodes:
  - name: localhost
    type: local
    options:
      exec_opts:
        shell: /bin/bash

  - name: backend-vm
    type: lxd-vm
    options:
      image: "ubuntu:24.04"
      exec_opts:
        shell: /bin/bash
      networks:
        - name: split-host-test
          ip: 10.103.103.10
      profiles:
        - backend-profile

  - name: frontend-vm
    type: lxd-vm
    options:
      image: "ubuntu:24.04"
      exec_opts:
        shell: /bin/bash
      networks:
        - name: split-host-test
          ip: 10.103.103.20
      profiles:
        - frontend-profile

########################################################################################################################
## Setup — backend API and frontend nginx                                                                             ##
########################################################################################################################
setup:
  ####################################################################################################################
  ## Backend VM setup                                                                                               ##
  ####################################################################################################################
  - name: "wait for cloud-init to complete on backend-vm"
    node: backend-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 300); do [ -f /tmp/cloud-init.complete ] && exit 0; sleep 1; done; echo "cloud-init timed out after 300s" >&2; exit 1

  - name: "run preflight setup on backend-vm"
    node: backend-vm
    step:
      type: execute
      options:
        command: "curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/preflight-setup.sh | sudo bash -s -- --yes"

  - name: "install aether-webd on backend-vm"
    node: backend-vm
    step:
      type: execute
      options:
        command: "curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/install.sh | sudo bash"

  - name: "configure backend for split hosting with CORS"
    node: backend-vm
    step:
      type: execute
      options:
        command: |
          sudo bash -c 'cat > /etc/aether-webd/env <<EOF
          AETHER_LISTEN=0.0.0.0:8186
          AETHER_SERVE_FRONTEND=false
          AETHER_CORS_ORIGINS=http://10.103.103.20
          EOF'

  - name: "restart backend and wait for readiness"
    node: backend-vm
    step:
      type: execute
      options:
        command: |
          sudo systemctl restart aether-webd
          for i in $(seq 1 30); do curl -sf http://localhost:8186/healthz && exit 0; sleep 1; done; exit 1

  ####################################################################################################################
  ## Frontend VM setup                                                                                              ##
  ####################################################################################################################
  - name: "wait for cloud-init to complete on frontend-vm"
    node: frontend-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 300); do [ -f /tmp/cloud-init.complete ] && exit 0; sleep 1; done; echo "cloud-init timed out after 300s" >&2; exit 1

  - name: "install deploy-frontend helper script"
    node: frontend-vm
    step:
      type: execute
      options:
        command: |
          cat > /usr/local/bin/deploy-frontend <<'SCRIPT'
          #!/usr/bin/env bash
          # deploy-frontend — Clone/update, build, and serve the Aether WebUI frontend.
          #
          # Usage:
          #   deploy-frontend                # latest main
          #   deploy-frontend <branch>       # specific branch
          #   deploy-frontend <commit>       # specific commit/tag
          #
          # Re-running switches to the requested ref, rebuilds, and reloads nginx.

          set -euo pipefail

          REPO="https://github.com/bgrewell/aether-webui-web.git"
          DIR="/opt/aether-frontend"
          BACKEND="http://10.103.103.10:8186"
          REF="${1:-main}"

          log() { echo "[deploy-frontend] $*"; }

          # Clone or fetch
          if [ -d "$DIR/.git" ]; then
              log "Fetching latest from origin"
              git -C "$DIR" fetch --all --prune
          else
              log "Cloning $REPO"
              git clone "$REPO" "$DIR"
          fi

          # Checkout requested ref
          log "Checking out: $REF"
          git -C "$DIR" checkout --force "$REF" 2>/dev/null \
              || git -C "$DIR" checkout --force "origin/$REF"

          # Pull if on a branch
          if git -C "$DIR" symbolic-ref -q HEAD &>/dev/null; then
              git -C "$DIR" pull --ff-only 2>/dev/null || true
          fi

          COMMIT=$(git -C "$DIR" rev-parse --short HEAD)
          log "At commit $COMMIT"

          # Build
          log "Installing dependencies"
          cd "$DIR" && npm install --no-audit --no-fund

          log "Building (VITE_BACKEND_URL=$BACKEND)"
          VITE_BACKEND_URL="$BACKEND" npm run build

          if [ ! -f "$DIR/dist/index.html" ]; then
              echo "ERROR: build failed — dist/index.html not found" >&2
              exit 1
          fi

          # Configure nginx (idempotent)
          cat > /etc/nginx/sites-available/aether-frontend <<NGINX
          server {
              listen 80;
              server_name _;
              root ${DIR}/dist;
              index index.html;

              location /api/ {
                  proxy_pass ${BACKEND};
              }
              location /docs {
                  proxy_pass ${BACKEND};
              }
              location /openapi {
                  proxy_pass ${BACKEND};
              }
              location /schemas {
                  proxy_pass ${BACKEND};
              }
              location /healthz {
                  proxy_pass ${BACKEND};
              }
              location / {
                  try_files \$uri \$uri/ /index.html;
              }
          }
          NGINX
          ln -sf /etc/nginx/sites-available/aether-frontend /etc/nginx/sites-enabled/aether-frontend
          rm -f /etc/nginx/sites-enabled/default
          nginx -t && systemctl reload nginx

          log "Frontend deployed at $COMMIT (ref: $REF)"
          SCRIPT
          chmod +x /usr/local/bin/deploy-frontend

  - name: "deploy frontend from main"
    node: frontend-vm
    step:
      type: execute
      options:
        command: deploy-frontend main

  - name: "wait for nginx readiness"
    node: frontend-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 30); do curl -sf http://localhost/ && exit 0; sleep 1; done; exit 1

########################################################################################################################
## Tests — health, frontend serving, and CORS validation                                                              ##
########################################################################################################################
tests:
  - name: "backend health check returns healthy"
    node: backend-vm
    type: execute
    options:
      command: curl -sf http://localhost:8186/healthz
      evaluate:
        exit_code: 0
        contains: "healthy"

  - name: "nginx serves frontend index page"
    node: frontend-vm
    type: execute
    options:
      command: curl -sf http://localhost/
      evaluate:
        exit_code: 0
        contains: "html"

  - name: "nginx proxies API requests to backend"
    node: frontend-vm
    type: execute
    options:
      command: curl -sf http://localhost/api/v1/meta/version | jq -e '.version'
      evaluate:
        exit_code: 0

  - name: "nginx proxies docs to backend"
    node: frontend-vm
    type: execute
    options:
      command: curl -sf http://localhost/docs
      evaluate:
        exit_code: 0
        contains: "html"

  - name: "nginx proxies OpenAPI spec to backend"
    node: frontend-vm
    type: execute
    options:
      command: curl -sf http://localhost/openapi.yaml
      evaluate:
        exit_code: 0
        contains: "openapi"

  - name: "CORS allows configured origin"
    node: backend-vm
    type: execute
    options:
      command: >-
        curl -sf -D- -o /dev/null
        -H "Origin: http://10.103.103.20"
        http://localhost:8186/healthz
        | grep -i "Access-Control-Allow-Origin: http://10.103.103.20"
      evaluate:
        exit_code: 0

  - name: "CORS preflight returns correct headers"
    node: backend-vm
    type: execute
    options:
      command: >-
        curl -sf -D- -o /dev/null
        -X OPTIONS
        -H "Origin: http://10.103.103.20"
        -H "Access-Control-Request-Method: GET"
        -H "Access-Control-Request-Headers: Content-Type"
        http://localhost:8186/healthz
        | grep -i "Access-Control-Allow-Origin: http://10.103.103.20"
        && curl -sf -D- -o /dev/null
        -X OPTIONS
        -H "Origin: http://10.103.103.20"
        -H "Access-Control-Request-Method: GET"
        -H "Access-Control-Request-Headers: Content-Type"
        http://localhost:8186/healthz
        | grep -i "Access-Control-Allow-Methods"
      evaluate:
        exit_code: 0

  - name: "CORS rejects unauthorized origin"
    node: backend-vm
    type: execute
    options:
      command: >-
        curl -sf -D /tmp/cors_headers -o /dev/null
        -H "Origin: http://evil.example.com"
        http://localhost:8186/healthz
        && ! grep -qi "Access-Control-Allow-Origin" /tmp/cors_headers
      evaluate:
        exit_code: 0

########################################################################################################################
## Teardown — clean up both VMs                                                                                       ##
########################################################################################################################
teardown:
  - name: "uninstall aether-webd on backend-vm"
    node: backend-vm
    step:
      type: execute
      options:
        command: curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/uninstall.sh | sudo bash -s -- --purge

  - name: "remove nginx config and frontend build on frontend-vm"
    node: frontend-vm
    step:
      type: execute
      options:
        command: |
          sudo rm -f /etc/nginx/sites-enabled/aether-frontend /etc/nginx/sites-available/aether-frontend
          sudo rm -rf /opt/aether-frontend
          sudo systemctl restart nginx
