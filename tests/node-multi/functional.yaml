---
########################################################################################################################
## Test Suite Configuration                                                                                           ##
########################################################################################################################
# Multi-node deployment smoke test. A control node runs aether-webd and orchestrates deployments via Ansible to two
# target nodes: one for the core network (k8s + 5gc) and one for the RAN (srsRAN). This test validates that the
# multi-node environment can be provisioned, nodes registered and reachable, and components installed across machines.
suite: Aether Multi Node Deployment Test Suite

########################################################################################################################
## Node Infrastructure Configuration                                                                                  ##
########################################################################################################################
lxd:
  networks:
    - name: multi-node-test
      type: bridge
      subnet: 10.103.102.0/24
      gateway: 10.103.102.1

  profiles:
    - name: control-profile
      description: Profile for the control node (runs aether-webd + Ansible)
      devices:
        root:
          type: disk
          path: /
          pool: default
          opts:
            size: 50GB
      config:
        limits.cpu: "2"
        limits.memory: "4GB"

        user.user-data: |
          #cloud-config
          package_update: true
          packages:
            - curl
            - jq
          runcmd:
            - [ bash, -c, 'echo "complete" > /tmp/cloud-init.complete' ]

    - name: core-profile
      description: Profile for the core node (k8s + 5gc)
      devices:
        root:
          type: disk
          path: /
          pool: default
          opts:
            size: 100GB
      config:
        limits.cpu: "4"
        limits.memory: "8GB"

        user.user-data: |
          #cloud-config
          package_update: true
          packages:
            - curl
            - jq
          runcmd:
            - [ bash, -c, 'echo "complete" > /tmp/cloud-init.complete' ]

    - name: ran-profile
      description: Profile for the RAN node (srsRAN)
      devices:
        root:
          type: disk
          path: /
          pool: default
          opts:
            size: 100GB
      config:
        limits.cpu: "4"
        limits.memory: "8GB"

        user.user-data: |
          #cloud-config
          package_update: true
          packages:
            - curl
            - jq
          runcmd:
            - [ bash, -c, 'echo "complete" > /tmp/cloud-init.complete' ]

nodes:
  - name: localhost
    type: local
    options:
      exec_opts:
        shell: /bin/bash

  - name: control-vm
    type: lxd-vm
    options:
      image: "ubuntu:24.04"
      exec_opts:
        shell: /bin/bash
      networks:
        - name: multi-node-test
          ip: 10.103.102.10
      profiles:
        - control-profile

  - name: core-vm
    type: lxd-vm
    options:
      image: "ubuntu:24.04"
      exec_opts:
        shell: /bin/bash
      networks:
        - name: multi-node-test
          ip: 10.103.102.20
      profiles:
        - core-profile

  - name: ran-vm
    type: lxd-vm
    options:
      image: "ubuntu:24.04"
      exec_opts:
        shell: /bin/bash
      networks:
        - name: multi-node-test
          ip: 10.103.102.30
      profiles:
        - ran-profile

########################################################################################################################
## Setup — control node with aether-webd, target nodes with preflight                                                 ##
########################################################################################################################
setup:
  ####################################################################################################################
  ## Wait for cloud-init on all VMs                                                                                 ##
  ####################################################################################################################
  - name: "wait for cloud-init on control-vm"
    node: control-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 300); do [ -f /tmp/cloud-init.complete ] && exit 0; sleep 1; done; echo "cloud-init timed out after 300s" >&2; exit 1

  - name: "wait for cloud-init on core-vm"
    node: core-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 300); do [ -f /tmp/cloud-init.complete ] && exit 0; sleep 1; done; echo "cloud-init timed out after 300s" >&2; exit 1

  - name: "wait for cloud-init on ran-vm"
    node: ran-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 300); do [ -f /tmp/cloud-init.complete ] && exit 0; sleep 1; done; echo "cloud-init timed out after 300s" >&2; exit 1

  ####################################################################################################################
  ## Preflight setup on all nodes (creates aether user, enables SSH, installs packages)                             ##
  ####################################################################################################################
  - name: "run preflight setup on control-vm"
    node: control-vm
    step:
      type: execute
      options:
        command: "curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/preflight-setup.sh | sudo bash -s -- --yes"

  - name: "run preflight setup on core-vm"
    node: core-vm
    step:
      type: execute
      options:
        command: "curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/preflight-setup.sh | sudo bash -s -- --yes"

  - name: "run preflight setup on ran-vm"
    node: ran-vm
    step:
      type: execute
      options:
        command: "curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/preflight-setup.sh | sudo bash -s -- --yes"

  ####################################################################################################################
  ## Install aether-webd on the control node only                                                                   ##
  ####################################################################################################################
  - name: "pre-configure environment on control-vm"
    node: control-vm
    step:
      type: execute
      options:
        command: |
          sudo mkdir -p /etc/aether-webd
          sudo bash -c 'printf "AETHER_LISTEN=0.0.0.0:8186\nANSIBLE_HOST_KEY_CHECKING=False\nHOME=/var/lib/aether-webd\n" > /etc/aether-webd/env'

  - name: "install aether-webd on control-vm"
    node: control-vm
    step:
      type: execute
      options:
        command: "curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/install.sh | sudo bash"

  - name: "wait for aether-webd readiness"
    node: control-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 30); do curl -sf http://localhost:8186/healthz && exit 0; sleep 1; done; exit 1

  - name: "wait for OnRamp repo clone to complete"
    node: control-vm
    step:
      type: execute
      options:
        command: for i in $(seq 1 120); do curl -sf http://localhost:8186/api/v1/onramp/repo | jq -e '.cloned == true' && exit 0; sleep 1; done; exit 1

  - name: "verify OnRamp provider is not degraded"
    node: control-vm
    step:
      type: execute
      options:
        command: |
          PROVIDERS=$(curl -sf http://localhost:8186/api/v1/meta/providers)
          if ! echo "$PROVIDERS" | jq -e '.providers | any(.name == "onramp")' > /dev/null 2>&1; then
            echo "ERROR: onramp provider not found in providers list"
            echo "$PROVIDERS" | jq .
            exit 1
          fi
          if echo "$PROVIDERS" | jq -e '.providers[] | select(.name == "onramp") | .degraded' | grep -q true; then
            echo "ERROR: onramp provider is degraded"
            echo "$PROVIDERS" | jq '.providers[] | select(.name == "onramp")'
            exit 1
          fi

  ####################################################################################################################
  ## Register target nodes and sync inventory                                                                       ##
  ####################################################################################################################
  - name: "register core-vm as master+worker node"
    node: control-vm
    step:
      type: execute
      options:
        command: >-
          curl -sf -X POST http://localhost:8186/api/v1/nodes
          -H 'Content-Type: application/json'
          -d '{"name":"core-vm","ansible_host":"10.103.102.20","ansible_user":"aether","password":"aether","sudo_password":"aether","roles":["master","worker"]}'
          | jq -e '.id != ""'

  - name: "register ran-vm as srsran node"
    node: control-vm
    step:
      type: execute
      options:
        command: >-
          curl -sf -X POST http://localhost:8186/api/v1/nodes
          -H 'Content-Type: application/json'
          -d '{"name":"ran-vm","ansible_host":"10.103.102.30","ansible_user":"aether","password":"aether","sudo_password":"aether","roles":["srsran"]}'
          | jq -e '.id != ""'

  - name: "sync inventory"
    node: control-vm
    step:
      type: execute
      options:
        command: curl -sf -X POST http://localhost:8186/api/v1/onramp/inventory/sync | jq -e '.message | test("2 nodes")'

  ####################################################################################################################
  ## Verify connectivity to both target nodes                                                                       ##
  ####################################################################################################################
  - name: "execute pingall"
    node: control-vm
    step:
      type: execute
      options:
        command: curl -sf -X POST http://localhost:8186/api/v1/onramp/components/cluster/pingall | jq -r '.id' | tee /tmp/pingall_task_id

  - name: "wait for pingall to complete"
    node: control-vm
    step:
      type: execute
      options:
        command: >-
          TASK_ID=$(cat /tmp/pingall_task_id);
          for i in $(seq 1 120); do
            STATUS=$(curl -sf "http://localhost:8186/api/v1/onramp/tasks/${TASK_ID}" | jq -r '.status');
            [ "$STATUS" != "running" ] && [ "$STATUS" != "pending" ] && exit 0;
            sleep 1;
          done;
          exit 1

  - name: "verify pingall succeeded"
    node: control-vm
    step:
      type: execute
      options:
        command: >-
          TASK_ID=$(cat /tmp/pingall_task_id);
          curl -sf "http://localhost:8186/api/v1/onramp/tasks/${TASK_ID}" | jq -e '.status == "succeeded"'

  - name: "dump pingall output on failure"
    node: control-vm
    step:
      type: execute
      options:
        command: >-
          TASK_ID=$(cat /tmp/pingall_task_id);
          STATUS=$(curl -sf "http://localhost:8186/api/v1/onramp/tasks/${TASK_ID}" | jq -r '.status');
          if [ "$STATUS" != "succeeded" ]; then
            echo "=== Task status: $STATUS ===";
            curl -sf "http://localhost:8186/api/v1/onramp/tasks/${TASK_ID}" | jq '{status, exit_code}';
            echo "=== Task output ===";
            curl -sf "http://localhost:8186/api/v1/onramp/tasks/${TASK_ID}" | jq -r '.output';
          fi;
          exit 0

########################################################################################################################
## Tests — environment validation                                                                                     ##
########################################################################################################################
tests:
  - name: "control-vm: health check"
    node: control-vm
    type: execute
    options:
      command: curl -sf http://localhost:8186/healthz
      evaluate:
        exit_code: 0
        contains: "healthy"

  - name: "control-vm: two nodes registered"
    node: control-vm
    type: execute
    options:
      command: curl -sf http://localhost:8186/api/v1/nodes | jq -e 'length == 2'
      evaluate:
        exit_code: 0

  - name: "control-vm: inventory has both nodes"
    node: control-vm
    type: execute
    options:
      command: >-
        curl -sf http://localhost:8186/api/v1/onramp/inventory
        | jq -e '.nodes | length == 2 and any(.[]; .name == "core-vm") and any(.[]; .name == "ran-vm")'
      evaluate:
        exit_code: 0

  - name: "control-vm: core-vm has master+worker roles"
    node: control-vm
    type: execute
    options:
      command: >-
        curl -sf http://localhost:8186/api/v1/onramp/inventory
        | jq -e '.nodes[] | select(.name == "core-vm") | (.roles | sort) == ["master","worker"]'
      evaluate:
        exit_code: 0

  - name: "control-vm: ran-vm has srsran role"
    node: control-vm
    type: execute
    options:
      command: >-
        curl -sf http://localhost:8186/api/v1/onramp/inventory
        | jq -e '.nodes[] | select(.name == "ran-vm") | .roles == ["srsran"]'
      evaluate:
        exit_code: 0

########################################################################################################################
## Teardown — clean up all VMs                                                                                        ##
########################################################################################################################
teardown:
  - name: "uninstall aether-webd on control-vm"
    node: control-vm
    step:
      type: execute
      options:
        command: curl -fsSL https://raw.githubusercontent.com/bengrewell/aether-webui/main/scripts/uninstall.sh | sudo bash -s -- --purge
